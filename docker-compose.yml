services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - rlm-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rlm-langgraph-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - ./app:/app
      - ./document_storage:/app/document_storage
      - ./checkpoints:/app/checkpoints    # persist graph checkpoints
    networks:
      - rlm-net

networks:
  rlm-net:
    driver: bridge
